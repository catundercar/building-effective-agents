<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0A0A0B"/>
  <!-- terminal window frame -->
  <rect x="4" y="6" width="24" height="20" rx="3" fill="none" stroke="#71717A" stroke-width="1.5"/>
  <!-- title bar dots -->
  <circle cx="8" cy="9.5" r="1" fill="#E8453C"/>
  <circle cx="11.5" cy="9.5" r="1" fill="#D97706"/>
  <circle cx="15" cy="9.5" r="1" fill="#059669"/>
  <!-- prompt chevron > -->
  <path d="M8 16 L12 19 L8 22" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor block -->
  <rect x="15" y="17" width="7" height="3" rx="0.5" fill="#E4E4E7" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.2;0.85" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
